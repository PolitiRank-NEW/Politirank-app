# Evolution API — ambiente local para testes PoliticRank
# Uso: cd docker/evolution && docker compose up -d

services:
  evolution-api:
    container_name: politirank_evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - evolution-redis
      - evolution-postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"

  evolution-redis:
    container_name: politirank_evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - evolution_redis:/data

  evolution-postgres:
    container_name: politirank_evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_local_pass
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres:/var/lib/postgresql/data

volumes:
  evolution_instances:
  evolution_redis:
  evolution_postgres:
