# Evolution API — produção (Contabo / Hetzner)
# Uso na VPS:
#   cp .env.production.example .env.production
#   # edite .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Caddy (HTTPS) fica FORA deste compose — ver README.prod.md

services:
  evolution-api:
    container_name: politirank_evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    # Só localhost: Caddy no host faz proxy 443 → 127.0.0.1:8080
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.production
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - evolution-redis
      - evolution-postgres
    networks:
      - evolution_net

  evolution-redis:
    container_name: politirank_evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - evolution_redis:/data
    networks:
      - evolution_net

  evolution-postgres:
    container_name: politirank_evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - evolution_net
    # Sem ports: — Postgres só na rede Docker interna
volumes:
  evolution_instances:
  evolution_redis:
  evolution_postgres:

networks:
  evolution_net:
    driver: bridge
